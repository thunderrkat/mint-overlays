<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 1080px; height: 52px;
    background: transparent; overflow: hidden;
    font-family: 'Arial Black', sans-serif;
  }

  .ticker-wrap {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, rgba(60,0,100,0.9) 0%, rgba(20,0,50,0.85) 100%);
    border-top: 2px solid #9b30ff;
    border-bottom: 2px solid #9b30ff;
    box-shadow: 0 0 20px rgba(155,48,255,0.5);
    overflow: hidden; position: relative;
    display: flex; align-items: center;
  }

  .ticker-label {
    background: #ff2d78; color: #fff;
    font-size: 13px; font-weight: 900;
    padding: 0 16px; height: 100%;
    display: flex; align-items: center;
    letter-spacing: 2px;
    white-space: nowrap; flex-shrink: 0;
    box-shadow: 4px 0 15px rgba(255,45,120,0.6);
    z-index: 2;
  }

  .ticker-track {
    display: flex; align-items: center;
    white-space: nowrap;
    animation: scroll 25s linear infinite;
  }

  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .tick-item {
    display: inline-flex; align-items: center; gap: 6px;
    color: #fff; font-size: 16px; font-weight: bold;
    padding: 0 24px;
    border-right: 1px solid rgba(155,48,255,0.3);
  }
  .tick-item .evt-icon { font-size: 18px; }
  .tick-item .evt-user { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }
  .tick-item .evt-msg { color: rgba(255,255,255,0.8); }
  .tick-item.gift .evt-msg { color: #ff2d78; }

  .ticker-wrap::after {
    content: '';
    position: absolute; right: 0; top: 0;
    width: 60px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(20,0,50,0.9));
    pointer-events: none; z-index: 3;
  }
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-label">⚡ LIVE EVENTS</div>
  <div class="ticker-track" id="track"></div>
</div>

<script>
const events = [
  { icon: '❤️', user: 'nightowl_tx', msg: 'followed!', cls: '' },
  { icon: '🎁', user: 'dragon_king_99', msg: 'sent 50 Dragon Balls!', cls: 'gift' },
  { icon: '⭐', user: 'purplelightning7', msg: 'subscribed!', cls: '' },
  { icon: '🎁', user: 'vegeta_fan_xx', msg: 'sent 30 Universes!', cls: 'gift' },
  { icon: '❤️', user: 'fortnite_god07', msg: 'followed!', cls: '' },
  { icon: '🎁', user: 'goku_super', msg: 'sent 100 Roses!', cls: 'gift' },
  { icon: '👍', user: 'nightwatcher99', msg: 'liked the stream!', cls: '' },
  { icon: '🎁', user: 'zfighter44', msg: 'sent 15 Dragon Balls!', cls: 'gift' },
];

// Duplicate for seamless loop
const track = document.getElementById('track');
const allEvents = [...events, ...events];
track.innerHTML = allEvents.map(e => `
  <div class="tick-item ${e.cls}">
    <span class="evt-icon">${e.icon}</span>
    <span class="evt-user">${e.user}</span>
    <span class="evt-msg">${e.msg}</span>
  </div>
`).join('');
</script>
</body>
</html>
