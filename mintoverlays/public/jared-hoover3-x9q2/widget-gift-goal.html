<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 400px; height: 100px;
    background: transparent; overflow: hidden;
    font-family: 'Arial Black', sans-serif;
  }

  .goal-wrap {
    width: 100%; height: 100%;
    background: rgba(15,0,30,0.85);
    border: 1px solid rgba(155,48,255,0.6);
    border-radius: 12px;
    padding: 12px 18px;
    box-shadow: 0 0 20px rgba(155,48,255,0.4), inset 0 0 20px rgba(80,0,120,0.3);
  }

  .goal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .goal-label {
    color: #FFD700; font-size: 14px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,215,0,0.7);
  }
  .goal-count {
    color: #fff; font-size: 13px;
  }
  .goal-count span { color: #ff2d78; font-weight: bold; }

  .bar-bg {
    width: 100%; height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 9px; overflow: hidden;
    border: 1px solid rgba(155,48,255,0.3);
  }
  .bar-fill {
    height: 100%; border-radius: 9px;
    background: linear-gradient(90deg, #9b30ff, #ff2d78, #FFD700);
    box-shadow: 0 0 15px rgba(255,45,120,0.6);
    transition: width 1s ease;
    position: relative; overflow: hidden;
  }
  .bar-fill::after {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    to { left: 200%; }
  }

  .goal-emoji { font-size: 16px; margin-left: 6px; }
</style>
</head>
<body>
<div class="goal-wrap">
  <div class="goal-header">
    <div class="goal-label">🎁 Gift Goal</div>
    <div class="goal-count"><span id="current">347</span> / <span id="target">500</span> gifts</div>
  </div>
  <div class="bar-bg">
    <div class="bar-fill" id="bar" style="width: 69.4%"></div>
  </div>
</div>

<script>
let current = 347, target = 500;
function updateBar() {
  const pct = Math.min((current / target) * 100, 100);
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('current').textContent = current;
}

// URL param override: ?current=200&target=500
const p = new URLSearchParams(location.search);
if (p.get('current')) current = parseInt(p.get('current'));
if (p.get('target')) target = parseInt(p.get('target'));
updateBar();
</script>
</body>
</html>
