<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#9B5BFF; --gold:#F4B63C; --orange:#F0760F;
  --tiktok-pink:#FE2C55; --tiktok-cyan:#25F4EE; --ink-2:#0d0322;
  --text:#F5F2FF; --text-muted:#8f7bbf;
  --panel:rgba(16,5,38,.85); --panel-line:rgba(155,91,255,.42);
  --font-cond:'Saira Condensed',sans-serif; --font-body:'Outfit',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:344px; height:340px; background:transparent; overflow:hidden; font-family:var(--font-body); }

.leaderboard {
  width:344px; height:340px;
  background:var(--panel); border:1.5px solid var(--panel-line); border-radius:18px;
  padding:14px 14px 12px; backdrop-filter:blur(10px);
  box-shadow:0 12px 34px rgba(0,0,0,.45);
  display:flex; flex-direction:column;
}
.tabs { display:flex; margin-bottom:10px; border-radius:8px; overflow:hidden; border:1px solid var(--panel-line); flex-shrink:0; }
.tab {
  flex:1; padding:6px 4px; font-family:var(--font-cond); font-size:12px; font-weight:800;
  letter-spacing:1px; text-align:center; cursor:pointer; color:var(--text-muted);
  background:transparent; border:none; transition:all .2s; text-transform:uppercase;
}
.tab.active { background:rgba(155,91,255,.3); color:var(--text); }
.lb-head {
  display:flex; align-items:center; gap:9px; margin-bottom:8px; padding-bottom:8px;
  border-bottom:1px solid rgba(155,91,255,.22); flex-shrink:0;
}
.lb-head .t { font-family:var(--font-cond); font-weight:800; font-size:19px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; }
.lb-list { display:flex; flex-direction:column; gap:6px; flex:1; overflow:hidden; }
.lb-row { display:flex; align-items:center; gap:10px; min-height:0; }
.lb-rank { font-family:'Anton',sans-serif; font-size:18px; width:20px; text-align:center; flex-shrink:0; }
.lb-av {
  width:34px; height:34px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:14px; color:var(--ink-2);
}
.lb-name { flex:1; min-width:0; }
.lb-name .n { font-weight:700; font-size:15px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-name .c { font-weight:600; font-size:12px; color:#9d86c9; }
.lb-icon { font-size:14px; flex-shrink:0; }
.lb-list { transition:opacity .25s; }
.lb-list.fade { opacity:0; }
.empty { color:var(--text-muted); font-size:14px; text-align:center; padding:20px 0; }
</style>
</head>
<body>
<div class="leaderboard">
  <div class="tabs">
    <button class="tab active" onclick="setTab('gifters')">🎁 Gifters</button>
    <button class="tab" onclick="setTab('likers')">❤️ Likers</button>
    <button class="tab" onclick="setTab('followers')">➕ Follows</button>
  </div>
  <div class="lb-head">
    <span id="head-icon">🏆</span>
    <span class="t" id="head-title">Top Gifters</span>
  </div>
  <div class="lb-list" id="list"></div>
</div>

<script>
const SESSION = 'jared-hoover3-x9q2';
const RANK_COLORS = ['#F4B63C','#C9CBD6','#E0823C','#9B5BFF','#FE2C55'];
const RANK_ICONS_GIFT   = ['👑','💎','🌹','💜','🐉'];
const RANK_ICONS_LIKE   = ['🔥','💖','⚡','💜','🐉'];
const RANK_ICONS_FOLLOW = ['🆕','🆕','🆕','🆕','🆕'];

let liveData = { gifters:[], likers:[], followers:[] };
let currentTab = 'gifters';

const CONFIGS = {
  gifters:   { icon:'🏆', title:'Top Gifters',    key:'gifters',   icons:RANK_ICONS_GIFT,   sub: r => r.count + ' coins' },
  likers:    { icon:'❤️', title:'Top Likers',     key:'likers',    icons:RANK_ICONS_LIKE,   sub: r => r.count + ' likes' },
  followers: { icon:'➕', title:'New Followers',  key:'followers', icons:RANK_ICONS_FOLLOW, sub: () => 'just followed' },
};

function getInitial(name) { return (name || '?').replace('@','').charAt(0).toUpperCase(); }

function renderTab(tab) {
  const cfg = CONFIGS[tab];
  document.getElementById('head-icon').textContent = cfg.icon;
  document.getElementById('head-title').textContent = cfg.title;
  const rows = liveData[cfg.key] || [];
  const list = document.getElementById('list');
  list.classList.add('fade');
  setTimeout(() => {
    if (rows.length === 0) {
      list.innerHTML = '<div class="empty">No data yet — go live! 🎵</div>';
    } else {
      list.innerHTML = rows.slice(0,5).map((r, i) => {
        const name = '@' + (r.nickname || r.id || 'unknown');
        const color = RANK_COLORS[i] || '#9B5BFF';
        const bg = `linear-gradient(135deg,${color},${color}88)`;
        return `<div class="lb-row">
          <span class="lb-rank" style="color:${color}">${i+1}</span>
          <div class="lb-av" style="background:${bg};border:2px solid ${color}">${getInitial(r.nickname)}</div>
          <div class="lb-name">
            <div class="n">${name}</div>
            <div class="c">${cfg.sub(r)}</div>
          </div>
          <span class="lb-icon">${cfg.icons[i] || '⭐'}</span>
        </div>`;
      }).join('');
    }
    list.classList.remove('fade');
  }, 150);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['gifters','likers','followers'][i] === tab);
  });
  renderTab(tab);
}

// SSE connection for live data
const es = new EventSource('/events/' + SESSION);
es.onmessage = e => {
  const d = JSON.parse(e.data);
  if (d.type === 'state') {
    if (d.gifters)   liveData.gifters   = d.gifters;
    if (d.likers)    liveData.likers    = d.likers;
    if (d.followers) liveData.followers = d.followers;
    renderTab(currentTab);
  }
};

// Auto-cycle tabs every 8s
let autoIdx = 0;
const tabOrder = ['gifters','likers','followers'];
setInterval(() => {
  autoIdx = (autoIdx + 1) % 3;
  setTab(tabOrder[autoIdx]);
}, 8000);

// Initial render
renderTab('gifters');
</script>
</body>
</html>
