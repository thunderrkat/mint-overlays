<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#003594;--navy-deep:#041E42;--silver:#869397;--steel:#C0C0C0;--gold:#D4AF37;
  --ink-2:#050F1A;--text:#FFFFFF;--text-dim:#B8C8E8;--text-muted:#5a7a9a;
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:64px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.ticker{width:1080px;height:64px;display:flex;align-items:center;overflow:hidden;background:linear-gradient(90deg,rgba(2,8,16,.96),rgba(4,14,34,.92));position:relative;}
.ticker::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--navy-deep),var(--navy) 30%,var(--steel) 50%,var(--navy) 70%,var(--navy-deep));}
.ticker::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--navy-deep),var(--navy) 30%,var(--steel) 50%,var(--navy) 70%,var(--navy-deep));}
.ticker-label{flex:none;display:flex;align-items:center;gap:10px;height:100%;padding:0 22px;z-index:2;background:linear-gradient(90deg,var(--navy-deep),var(--navy));font-family:var(--font-cond);font-weight:800;font-size:18px;letter-spacing:3px;color:var(--text);box-shadow:6px 0 18px rgba(0,0,0,.5);white-space:nowrap;border-right:2px solid var(--steel);}
.ticker-star{width:16px;height:16px;color:var(--gold);}
.ticker-window{flex:1;overflow:hidden;}
.ticker-track{display:flex;align-items:center;white-space:nowrap;}
.ticker-item{display:inline-flex;align-items:center;gap:10px;padding:0 28px;font-size:17px;font-weight:600;color:var(--text-dim);border-right:1px solid rgba(0,53,148,.3);}
.ticker-item .type{font-family:var(--font-cond);font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0;}
.ticker-item .type.gift{background:rgba(212,175,55,.2);color:var(--gold);border:1px solid rgba(212,175,55,.3);}
.ticker-item .type.follow{background:rgba(134,147,151,.15);color:var(--steel);border:1px solid rgba(192,192,192,.25);}
.ticker-item .type.join{background:rgba(0,53,148,.2);color:#6699CC;border:1px solid rgba(0,53,148,.3);}
.ticker-item .who{font-weight:800;color:var(--text);}
.ticker-waiting{padding:0 24px;font-family:var(--font-cond);font-size:14px;letter-spacing:2px;color:rgba(0,53,148,.5);text-transform:uppercase;}
</style>
</head>
<body>
<div class="ticker">
  <div class="ticker-label">
    <svg class="ticker-star" viewBox="0 0 24 24" fill="currentColor" style="color:#D4AF37"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    LIVE FEED
  </div>
  <div class="ticker-window"><div class="ticker-track" id="track"><div class="ticker-waiting">WAITING FOR STREAM EVENTS</div></div></div>
</div>
<script>
const SESSION="senpaicjcollects0-v8n4";
const track=document.getElementById("track");
let events=[
  {type:"gift",  typeLabel:"GIFT",   who:"@dak_fan1",     msg:"sent a gift"},
  {type:"follow",typeLabel:"FOLLOW", who:"@cowboy_nation", msg:"followed"},
  {type:"gift",  typeLabel:"GIFT",   who:"@wresltkng",    msg:"sent another gift"},
  {type:"join",  typeLabel:"JOINED", who:"@fortnitepro",  msg:"joined the stream"},
  {type:"follow",typeLabel:"FOLLOW", who:"@star4ever",     msg:"followed"},
  {type:"gift",  typeLabel:"GIFT",   who:"@senpai_og",    msg:"sent a gift"},
],offset=0,animId;

function build(){
  if(events.length===0){cancelAnimationFrame(animId);track.style.transform="";track.innerHTML="<div class=\"ticker-waiting\">WAITING FOR STREAM EVENTS</div>";return;}
  const doubled=[...events,...events];
  track.innerHTML=doubled.map(e=>"<span class=\"ticker-item\"><span class=\"type "+e.type+"\">"+e.typeLabel+"</span><span class=\"who\">"+e.who+"</span><span>"+e.msg+"</span></span>").join("");
  cancelAnimationFrame(animId);offset=0;scroll();
}
function scroll(){
  const hw=track.scrollWidth/2;
  function step(){offset+=1.2;if(offset>=hw)offset=0;track.style.transform="translateX(-"+offset+"px)";animId=requestAnimationFrame(step);}
  animId=requestAnimationFrame(step);
}
function addEvent(evt){events.unshift(evt);if(events.length>20)events.pop();build();}

let prevGifters=[],prevFollowers=[],seenJoins=new Set();
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{
  const d=JSON.parse(e.data);
  if(d.type==="state"){
    if(d.gifters){
      d.gifters.forEach(g=>{
        const prev=prevGifters.find(p=>p.id===g.id);
        if(!prev){addEvent({type:"gift",typeLabel:"GIFT",who:"@"+(g.nickname||g.id),msg:"sent a gift"});}
        else if(g.count>prev.count){addEvent({type:"gift",typeLabel:"GIFT",who:"@"+(g.nickname||g.id),msg:"sent another gift"});}
      });
      prevGifters=d.gifters;
    }
    if(d.followers){
      d.followers.forEach(f=>{
        const key=f.id||f.nickname;
        if(!prevFollowers.find(p=>(p.id||p.nickname)===key)){addEvent({type:"follow",typeLabel:"FOLLOW",who:"@"+(f.nickname||f.id),msg:"followed"});}
      });
      prevFollowers=d.followers;
    }
  }
  if(d.type==="join"){
    const key=d.nickname||"unknown";
    if(!seenJoins.has(key)){seenJoins.add(key);if(seenJoins.size>300)seenJoins.clear();addEvent({type:"join",typeLabel:"JOINED",who:"@"+key,msg:"joined the stream"});}
  }
};
</script>
</body>
</html>
