<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#003594;--navy-deep:#041E42;--silver:#869397;--steel:#C0C0C0;--gold:#D4AF37;
  --ink-2:#050F1A;--ink-3:#0A1F35;
  --text:#FFFFFF;--text-dim:#B8C8E8;--text-muted:#5a7a9a;
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:420px;height:100px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.wrap{width:420px;height:100px;display:flex;align-items:center;}
.frame{
  position:relative;border-radius:12px;padding:3px;width:100%;
  background:linear-gradient(135deg,var(--navy-deep),var(--navy),var(--steel));
  box-shadow:0 6px 24px rgba(0,53,148,.5);
  opacity:0;transform:translateX(-24px);
  transition:opacity .3s ease,transform .3s cubic-bezier(.2,1,.3,1);
}
.frame.show{opacity:1;transform:translateX(0);}
.frame.hide{opacity:0;transform:translateX(24px);transition:opacity .22s ease-in,transform .22s ease-in;}
.body{border-radius:10px;background:linear-gradient(135deg,var(--ink-3),var(--ink-2));padding:12px 16px;display:flex;align-items:center;gap:14px;}
/* Avatar circle */
.av{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:var(--navy);border:2px solid var(--steel);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;color:var(--text);overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
/* Text */
.text{flex:1;min-width:0;}
.join-tag{font-family:var(--font-cond);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--silver);margin-bottom:2px;}
.join-name{font-family:var(--font-display);font-size:24px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 16px rgba(0,53,148,.5);}
.join-sub{font-size:13px;font-weight:600;color:var(--text-muted);margin-top:1px;}
/* Right badge */
.join-badge{flex-shrink:0;font-family:var(--font-display);font-size:13px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.2;}
</style>
</head>
<body>
<div class="wrap">
  <div class="frame" id="jf">
    <div class="body">
      <div class="av" id="av"><span id="av-init">?</span><img id="av-img" src="" alt="" style="display:none"></div>
      <div class="text">
        <div class="join-tag">NOW ENTERING THE ARENA</div>
        <div class="join-name" id="join-name">@viewer</div>
        <div class="join-sub">Welcome to the stream</div>
      </div>
      <div class="join-badge">LIVE<br>NOW</div>
    </div>
  </div>
</div>
<script>
const SESSION="senpaicjcollects0-v8n4";
const jf=document.getElementById("jf");
let queue=[],showing=false;
function getInit(n){return(n||"?").replace("@","").charAt(0).toUpperCase();}
function showJoin(d){
  const name="@"+(d.nickname||d.uniqueId||"viewer");
  document.getElementById("join-name").textContent=name;
  document.getElementById("av-init").textContent=getInit(d.nickname||d.uniqueId);
  const img=document.getElementById("av-img"),init=document.getElementById("av-init");
  if(d.profilePicture&&d.profilePicture!==""){img.src=d.profilePicture;img.style.display="block";init.style.display="none";img.onerror=()=>{img.style.display="none";init.style.display="block";};}
  else{img.style.display="none";init.style.display="block";}
  jf.classList.remove("hide");jf.classList.add("show");showing=true;
  setTimeout(()=>{jf.classList.remove("show");jf.classList.add("hide");showing=false;setTimeout(next,320);},3500);
}
function next(){if(queue.length>0&&!showing)showJoin(queue.shift());}
function push(d){queue.push(d);if(!showing)next();}
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="join")push(d);};

// Preview demo
const demoJoins = [
  {nickname:"dak_fan1",    profilePicture:""},
  {nickname:"cowboy_nation",profilePicture:""},
  {nickname:"fortnitepro", profilePicture:""},
  {nickname:"senpai_og",   profilePicture:""},
];
let dji=0;
function demoNext(){push(demoJoins[dji%demoJoins.length]);dji++;setTimeout(demoNext,5000);}
setTimeout(demoNext,1000);
</script>
</body>
</html>
