<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#CC0000;--blood:#8B0000;--ember:#FF2222;--steel:#888888;
  --ink-2:#110000;--ink-3:#1A0000;--text:#FFFFFF;--text-dim:#E0CCCC;
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:620px;height:130px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.wrap{width:620px;height:130px;display:flex;align-items:center;}
.frame{
  position:relative;border-radius:12px;padding:3px;width:100%;
  background:linear-gradient(135deg,var(--ink-2),var(--blood),var(--crimson),var(--steel));
  box-shadow:0 10px 36px rgba(204,0,0,.55),0 0 30px rgba(204,0,0,.15);
  opacity:0;transform:scale(.86) translateY(12px);
  transition:opacity .35s ease,transform .35s cubic-bezier(.2,1.1,.3,1);
}
.frame.show{opacity:1;transform:scale(1) translateY(0);}
.frame.hide{opacity:0;transform:scale(.88) translateY(-10px);transition:opacity .28s ease-in,transform .28s ease-in;}
.body{border-radius:10px;background:linear-gradient(160deg,var(--ink-3),var(--ink-2));padding:18px 22px;display:flex;align-items:center;gap:18px;height:100%;position:relative;overflow:hidden;}
/* Crack diagonal accent */
.body::before{content:"";position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(180deg,var(--crimson),transparent);opacity:.4;}
.type-badge{
  flex-shrink:0;min-width:70px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-right:1px solid rgba(204,0,0,.3);padding-right:16px;
}
.type-tag{font-family:var(--font-cond);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--steel);}
.type-main{font-family:var(--font-display);font-size:26px;letter-spacing:1px;text-transform:uppercase;line-height:1;}
.type-main.gift{color:var(--crimson);text-shadow:0 0 14px rgba(204,0,0,.7);}
.type-main.follow{color:var(--steel);}
.type-main.join{color:#884444;}
.content{flex:1;min-width:0;}
.alert-who{font-family:var(--font-display);font-size:28px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 20px rgba(204,0,0,.4);}
.alert-action{font-size:16px;font-weight:600;color:var(--text-dim);margin-top:3px;}
.alert-amt{flex-shrink:0;font-family:var(--font-display);font-size:30px;text-align:right;}
.alert-amt.gift{color:var(--crimson);text-shadow:0 0 16px rgba(204,0,0,.6);}
.alert-amt.follow{color:var(--steel);}
.alert-amt.join{color:#884444;}
</style>
</head>
<body>
<div class="wrap">
  <div class="frame" id="af">
    <div class="body">
      <div class="type-badge">
        <span class="type-tag" id="type-tag">NEW</span>
        <span class="type-main gift" id="type-main">GIFT</span>
      </div>
      <div class="content">
        <div class="alert-who" id="who">@val_slayer</div>
        <div class="alert-action" id="action">sent a gift</div>
      </div>
      <div class="alert-amt gift" id="amt">+52K</div>
    </div>
  </div>
</div>
<script>
const SESSION="assentrix-k4r7";
const af=document.getElementById("af");
let queue=[],showing=false,prevGifters=[],prevFollowers=[];
function showAlert(d){
  const tm=document.getElementById("type-main"),ta=document.getElementById("type-tag"),am=document.getElementById("amt");
  tm.textContent=d.typeMain;tm.className="type-main "+d.cls;
  ta.textContent=d.typeTag;
  document.getElementById("who").textContent=d.who;
  document.getElementById("action").textContent=d.action;
  am.textContent=d.amt;am.className="alert-amt "+d.cls;
  af.classList.remove("hide");af.classList.add("show");showing=true;
  setTimeout(()=>{af.classList.remove("show");af.classList.add("hide");showing=false;setTimeout(next,350);},4500);
}
function next(){if(queue.length>0&&!showing)showAlert(queue.shift());}
function push(d){queue.push(d);if(!showing)next();}
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{
  const d=JSON.parse(e.data);
  if(d.type==="state"){
    if(d.gifters&&d.gifters.length>0){
      const top=d.gifters[0],oldTop=prevGifters[0];
      if(prevGifters.length>0&&(!oldTop||top.id!==oldTop.id||top.count>oldTop.count))
        push({typeTag:"NEW",typeMain:"GIFT",cls:"gift",who:"@"+(top.nickname||top.id),action:!oldTop||top.id!==oldTop.id?"is the new top gifter!":"sent a gift",amt:"+"+top.count.toLocaleString()});
      prevGifters=d.gifters;
    }
    if(d.followers&&d.followers.length>prevFollowers.length){
      d.followers.slice(0,d.followers.length-prevFollowers.length).forEach(f=>push({typeTag:"NEW",typeMain:"FAN",cls:"follow",who:"@"+(f.nickname||f.id),action:"just followed",amt:"+1"}));
      prevFollowers=d.followers;
    }
  }
  if(d.type==="join")push({typeTag:"JOINED",typeMain:"LIVE",cls:"join",who:"@"+(d.nickname||"viewer"),action:"just joined the stream",amt:"HI"});
};
// Demo cycle for preview
setTimeout(()=>{
  if(!prevGifters.length){
    const demos=[
      {typeTag:"NEW",typeMain:"GIFT",cls:"gift",who:"@val_slayer",action:"is the new top gifter!",amt:"+52K"},
      {typeTag:"NEW",typeMain:"FAN",cls:"follow",who:"@valorant_pro",action:"just followed",amt:"+1"},
      {typeTag:"NEW",typeMain:"GIFT",cls:"gift",who:"@fnbeast99",action:"sent a gift",amt:"+38K"},
      {typeTag:"JOINED",typeMain:"LIVE",cls:"join",who:"@fn_daily",action:"just joined the stream",amt:"HI"},
    ];
    let di=0;function nd(){push(demos[di%demos.length]);di++;setTimeout(nd,6000);}nd();
  }
},1000);
</script>
</body>
</html>
