<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@700;800;900&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#DC143C;--crimson-hot:#FF2244;--crimson-dim:#AA0022;--crimson-deep:#660011;
  --steel:#3A3A3A;--ink:#0A0A0A;--ink-2:#111111;--ink-3:#1A0008;
  --text:#FFFFFF;--text-dim:#FFB0C0;--text-muted:#885566;--tiktok-pink:#FE2C55;
  --panel:rgba(15,0,5,.93);--panel-line:rgba(220,20,60,.45);
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:460px;height:130px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.meter{width:460px;height:130px;background:var(--panel);border:1.5px solid var(--panel-line);border-radius:12px;padding:14px 20px;box-shadow:0 8px 28px rgba(0,0,0,.8),0 0 16px rgba(220,20,60,.1);display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
.meter::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ink),var(--crimson-deep) 30%,var(--crimson) 50%,var(--crimson-deep) 70%,var(--ink));box-shadow:0 0 10px rgba(220,20,60,.7);}
.hex-hint{position:absolute;inset:0;pointer-events:none;opacity:.03;background-image:radial-gradient(circle,var(--crimson) 1px,transparent 1px);background-size:14px 14px;}
.top-row{display:flex;align-items:center;justify-content:space-between;}
.title{font-family:var(--font-cond);font-weight:800;font-size:16px;letter-spacing:3px;color:var(--crimson-hot);text-transform:uppercase;}
.like-count{font-family:var(--font-display);font-size:28px;color:var(--text);display:flex;align-items:baseline;gap:6px;text-shadow:0 0 20px rgba(220,20,60,.4);}
.like-label{font-family:var(--font-cond);font-size:12px;color:var(--text-muted);letter-spacing:2px;}
.bar-wrap{display:flex;flex-direction:column;gap:5px;}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);}
.bar-meta .power{color:var(--crimson);font-weight:800;font-family:var(--font-cond);letter-spacing:2px;font-size:13px;text-shadow:0 0 8px rgba(220,20,60,.6);}
.bar-bg{height:20px;border-radius:4px;background:rgba(10,0,4,.9);overflow:hidden;border:1px solid rgba(220,20,60,.2);position:relative;}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--crimson-deep) 0%,var(--crimson-dim) 40%,var(--crimson) 70%,var(--crimson-hot) 100%);box-shadow:0 0 16px rgba(220,20,60,.6);transition:width .8s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden;}
.bar-fill::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s ease-in-out infinite;}
.bar-gloss{position:absolute;inset:0;border-radius:4px;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent 55%);pointer-events:none;}
.bar-marks{position:absolute;inset:0;display:flex;}
.bar-mark{flex:1;border-right:1px solid rgba(0,0,0,.4);}
@keyframes shimmer{to{left:200%;}}
.milestone{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-family:var(--font-cond);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;color:var(--crimson-hot);opacity:0;transition:opacity .4s;text-shadow:0 0 10px rgba(220,20,60,.7);}
.milestone.show{opacity:1;}
</style>
</head>
<body>
<div class="meter">
  <div class="hex-hint"></div>
  <div class="top-row">
    <div class="title">❤️ LIKE-O-METER</div>
    <div class="like-count"><span id="like-num">8,500</span><span class="like-label">LIKES</span></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-meta">
      <span id="next-label">1,500 to next rank</span>
      <span class="power" id="power">IRON FIST</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="bar" style="width:0%"></div>
      <div class="bar-gloss"></div>
      <div class="bar-marks"><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div><div class='bar-mark'></div></div>
    </div>
  </div>
  <div class="milestone" id="milestone"></div>
</div>
<script>
const SESSION="swolemigoking-r3x7";
const T=[1000,2500,5000,10000,20000,40000,75000];
const PWR=["ROOKIE","GRINDER","IRON FIST","SWOLE RISING","BEAST MODE","IRON KING","MIGO ELITE","SWOLE GOD"];
const MS=["","1K — GRINDER!","2.5K — IRON FIST!","5K — SWOLE RISING!","10K — BEAST MODE!","20K — IRON KING!","40K — MIGO ELITE!","75K — SWOLE GOD!!"];
let likes=parseInt(new URLSearchParams(location.search).get("likes"))||0;
let lastLv=-1;
function update(n){
  likes=Math.max(0,n);document.getElementById("like-num").textContent=likes.toLocaleString();
  let lv=0;for(let i=0;i<7;i++){if(likes>=T[i])lv=i+1;}
  const prev=lv===0?0:T[lv-1],next=lv<7?T[lv]:T[6];
  const pct=lv<7?((likes-prev)/(next-prev))*100:100;
  document.getElementById("bar").style.width=Math.min(pct,100)+"%";
  document.getElementById("next-label").textContent=lv<7?(next-likes).toLocaleString()+" to next rank":"SWOLE GOD — MAX POWER";
  document.getElementById("power").textContent=PWR[lv];
  if(lv>lastLv&&lv>0){lastLv=lv;const m=document.getElementById("milestone");m.textContent=MS[lv];m.classList.add("show");setTimeout(()=>m.classList.remove("show"),3500);}
}
update(likes);
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="likeMeter")update(d.total||0);};
</script>
</body>
</html>
