<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#CC0000;--blood:#8B0000;--steel:#888888;
  --ink-2:#110000;--ink-3:#1A0000;
  --text:#FFFFFF;--text-dim:#E0CCCC;--text-muted:#996666;
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:420px;height:100px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.wrap{width:420px;height:100px;display:flex;align-items:center;}
.frame{
  position:relative;border-radius:10px;padding:3px;width:100%;
  background:linear-gradient(135deg,var(--ink-2),var(--blood),var(--crimson),var(--steel));
  box-shadow:0 6px 24px rgba(204,0,0,.5);
  opacity:0;transform:translateX(-24px);
  transition:opacity .3s ease,transform .3s cubic-bezier(.2,1,.3,1);
}
.frame.show{opacity:1;transform:translateX(0);}
.frame.hide{opacity:0;transform:translateX(24px);transition:opacity .22s ease-in,transform .22s ease-in;}
.body{border-radius:8px;background:linear-gradient(135deg,var(--ink-3),var(--ink-2));padding:11px 15px;display:flex;align-items:center;gap:13px;}
.av{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:var(--blood);border:2px solid var(--crimson);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;color:var(--text);overflow:hidden;box-shadow:0 0 10px rgba(204,0,0,.4);}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.text{flex:1;min-width:0;}
.join-tag{font-family:var(--font-cond);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--steel);margin-bottom:2px;}
.join-name{font-family:var(--font-display);font-size:24px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 16px rgba(204,0,0,.4);}
.join-sub{font-size:12px;font-weight:600;color:var(--text-muted);margin-top:1px;}
/* Valorant chevron accent */
.val-mark{flex-shrink:0;color:var(--crimson);font-size:28px;text-shadow:0 0 10px rgba(204,0,0,.7);}
</style>
</head>
<body>
<div class="wrap">
  <div class="frame" id="jf">
    <div class="body">
      <div class="av" id="av"><span id="av-init">?</span><img id="av-img" src="" style="display:none"></div>
      <div class="text">
        <div class="join-tag">Entering the Server</div>
        <div class="join-name" id="join-name">@viewer</div>
        <div class="join-sub">Welcome to the stream</div>
      </div>
      <div class="val-mark">⌖</div>
    </div>
  </div>
</div>
<script>
const SESSION="assentrix-k4r7";
const jf=document.getElementById("jf");
let queue=[],showing=false;
function getInit(n){return(n||"?").replace("@","").charAt(0).toUpperCase();}
function showJoin(d){
  const name="@"+(d.nickname||d.uniqueId||"viewer");
  document.getElementById("join-name").textContent=name;
  document.getElementById("av-init").textContent=getInit(d.nickname||d.uniqueId);
  const img=document.getElementById("av-img"),init=document.getElementById("av-init");
  if(d.profilePicture&&d.profilePicture!==""){img.src=d.profilePicture;img.style.display="block";init.style.display="none";img.onerror=()=>{img.style.display="none";init.style.display="block";};}
  else{img.style.display="none";init.style.display="block";}
  jf.classList.remove("hide");jf.classList.add("show");showing=true;
  setTimeout(()=>{jf.classList.remove("show");jf.classList.add("hide");showing=false;setTimeout(next,320);},3500);
}
function next(){if(queue.length>0&&!showing)showJoin(queue.shift());}
function push(d){queue.push(d);if(!showing)next();}
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="join")push(d);};
// Demo cycle
const demoJoins=[{nickname:"val_slayer"},{nickname:"fnbeast99"},{nickname:"valorant_pro"},{nickname:"clutch_king"}];
let dji=0;function demoNext(){push(demoJoins[dji%demoJoins.length]);dji++;setTimeout(demoNext,5000);}
setTimeout(demoNext,1500);
</script>
</body>
</html>
