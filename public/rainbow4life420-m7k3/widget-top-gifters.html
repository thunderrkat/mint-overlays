<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --neon-purple:#9B00FF;--ink-2:#0d0020;
  --text:#FFFFFF;--text-muted:#9966CC;
  --panel:rgba(10,0,20,.88);--panel-line:rgba(153,0,255,.45);
  --rainbow:linear-gradient(90deg,#FF2D2D,#FF7F00,#FFD700,#00CC44,#00AAFF,#CC00FF);
  --font-cond:'Saira Condensed',sans-serif;--font-body:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:344px;height:340px;background:transparent;overflow:hidden;font-family:var(--font-body);}

.leaderboard{
  width:344px;height:340px;
  background:var(--panel);border:1.5px solid var(--panel-line);border-radius:18px;
  padding:13px 14px;backdrop-filter:blur(10px);
  box-shadow:0 12px 34px rgba(0,0,0,.5),0 0 20px rgba(153,0,255,.2);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.leaderboard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rainbow);animation:shift 3s linear infinite;background-size:200% 100%;}
@keyframes shift{to{background-position:200% 0;}}

.tabs{display:flex;margin-bottom:9px;border-radius:8px;overflow:hidden;border:1px solid var(--panel-line);flex-shrink:0;}
.tab{flex:1;padding:7px 4px;font-family:var(--font-cond);font-size:13px;font-weight:800;letter-spacing:1px;text-align:center;cursor:pointer;color:var(--text-muted);background:transparent;border:none;transition:all .2s;text-transform:uppercase;}
.tab.active{background:rgba(153,0,255,.3);color:var(--text);}

.lb-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(153,0,255,.25);flex-shrink:0;}
.lb-title{font-family:var(--font-cond);font-weight:800;font-size:19px;letter-spacing:2px;text-transform:uppercase;background:var(--rainbow);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 100%;animation:shift 3s linear infinite;}

.lb-list{display:flex;flex-direction:column;gap:7px;flex:1;overflow:hidden;transition:opacity .25s;}
.lb-list.fade{opacity:0;}

.lb-row{display:flex;align-items:center;gap:10px;}

/* RANK — bigger, bolder */
.lb-rank{font-family:'Anton',sans-serif;font-size:22px;width:24px;text-align:center;flex-shrink:0;}

/* AVATAR — slightly larger */
.lb-av{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#000;}

/* NAME + SUBTEXT — bigger, more prominent */
.lb-name{flex:1;min-width:0;}
.lb-name .n{
  font-weight:800;font-size:17px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lb-name .c{
  font-weight:700;font-size:14px;color:#C9AEFF;
  margin-top:1px;
}
.lb-icon{font-size:16px;flex-shrink:0;}
.empty{color:var(--text-muted);font-size:14px;text-align:center;padding:20px 0;}
</style>
</head>
<body>
<div class="leaderboard">
  <div class="tabs">
    <button class="tab active" onclick="setTab('gifters')">🎁 Gifters</button>
    <button class="tab" onclick="setTab('likers')">❤️ Likers</button>
    <button class="tab" onclick="setTab('followers')">➕ Follows</button>
  </div>
  <div class="lb-head"><span id="head-icon">🌈</span><span class="lb-title" id="head-title">Top Gifters</span></div>
  <div class="lb-list" id="list"></div>
</div>

<script>
const SESSION = 'rainbow4life420-m7k3';
const RAINBOW_COLORS = ['#FF2D2D','#FF7F00','#FFD700','#00CC44','#00AAFF','#CC00FF'];
const ICONS = {
  gifters:   ['👑','💎','🌹','🌈','🍃'],
  likers:    ['🔥','💖','⚡','🌈','🍃'],
  followers: ['🆕','🆕','🆕','🆕','🆕'],
};

let live = { gifters:[], likers:[], followers:[] };
let currentTab = 'gifters';

const CFG = {
  gifters:   { icon:'🌈', title:'Top Gifters',   key:'gifters',   sub: r => r.count.toLocaleString() + ' coins' },
  likers:    { icon:'❤️', title:'Top Likers',    key:'likers',    sub: r => r.count.toLocaleString() + ' likes' },
  followers: { icon:'➕', title:'New Followers', key:'followers', sub: () => 'just followed' },
};

function getInit(n) { return (n || '?').replace('@','').charAt(0).toUpperCase(); }

function renderTab(tab) {
  const cfg = CFG[tab];
  document.getElementById('head-icon').textContent = cfg.icon;
  document.getElementById('head-title').textContent = cfg.title;
  const rows = live[cfg.key] || [];
  const list = document.getElementById('list');
  list.classList.add('fade');
  setTimeout(() => {
    if (rows.length === 0) {
      list.innerHTML = '<div class="empty">No data yet — go live! 🌈</div>';
    } else {
      list.innerHTML = rows.slice(0,5).map((r, i) => {
        const c = RAINBOW_COLORS[i % 6];
        return `<div class="lb-row">
          <span class="lb-rank" style="color:${c}">${i+1}</span>
          <div class="lb-av" style="background:${c};border:2px solid ${c}">${getInit(r.nickname)}</div>
          <div class="lb-name">
            <div class="n">@${r.nickname || r.id}</div>
            <div class="c">${cfg.sub(r)}</div>
          </div>
          <span class="lb-icon">${ICONS[tab][i] || '⭐'}</span>
        </div>`;
      }).join('');
    }
    list.classList.remove('fade');
  }, 150);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['gifters','likers','followers'][i] === tab)
  );
  renderTab(tab);
}

// SSE live data
const es = new EventSource('/events/' + SESSION);
es.onmessage = e => {
  const d = JSON.parse(e.data);
  if (d.type === 'state') {
    if (d.gifters)   live.gifters   = d.gifters;
    if (d.likers)    live.likers    = d.likers;
    if (d.followers) live.followers = d.followers;
    renderTab(currentTab);
  }
};

// Auto-cycle every 8s
let ai = 0;
setInterval(() => { ai = (ai+1)%3; setTab(['gifters','likers','followers'][ai]); }, 8000);

renderTab('gifters');
</script>
</body>
</html>
