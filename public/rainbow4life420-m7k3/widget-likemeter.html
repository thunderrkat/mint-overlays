<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@700;800;900&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --neon-purple:#9B00FF;--tiktok-pink:#FE2C55;
  --ink-2:#0d0020;--text:#FFFFFF;--text-dim:#E0CCFF;--text-muted:#9966CC;
  --panel:rgba(10,0,20,.88);--panel-line:rgba(153,0,255,.45);
  --rainbow:linear-gradient(90deg,#FF2D2D,#FF7F00,#FFD700,#00CC44,#00AAFF,#CC00FF);
  --font-display:'Anton',sans-serif;--font-cond:'Saira Condensed',sans-serif;--font-body:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:460px;height:130px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.meter{
  width:460px;height:130px;
  background:var(--panel);border:1.5px solid var(--panel-line);border-radius:16px;
  padding:14px 20px;backdrop-filter:blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
}
.meter::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rainbow);animation:shift 2s linear infinite;background-size:200% 100%;}
@keyframes shift{to{background-position:200% 0;}}
.top-row{display:flex;align-items:center;justify-content:space-between;}
.title{font-family:var(--font-cond);font-weight:800;font-size:18px;letter-spacing:2px;text-transform:uppercase;background:var(--rainbow);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 100%;animation:shift 2s linear infinite;display:flex;align-items:center;gap:7px;}
.like-count{font-family:var(--font-display);font-size:26px;color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,.6);display:flex;align-items:center;gap:6px;}
.heart{font-size:18px;animation:hb 1s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.bar-wrap{display:flex;flex-direction:column;gap:5px;}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);}
.bar-meta .power{color:#FFD700;font-weight:700;font-family:var(--font-cond);letter-spacing:1px;}
.bar-bg{height:18px;border-radius:9px;background:rgba(5,0,15,.9);overflow:hidden;border:1px solid rgba(153,0,255,.3);position:relative;}
.bar-fill{height:100%;border-radius:9px;background:var(--rainbow);background-size:200% 100%;animation:shift 2s linear infinite;box-shadow:0 0 14px rgba(153,0,255,.5);transition:width .8s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden;}
.bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.8s ease-in-out infinite;}
@keyframes shimmer{to{left:200%;}}
.bar-gloss{position:absolute;inset:0;border-radius:9px;background:linear-gradient(180deg,rgba(255,255,255,.3),transparent 55%);pointer-events:none;}
.milestone{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .4s;background:var(--rainbow);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 100%;animation:shift 2s linear infinite;}
.milestone.show{opacity:1;}
</style>
</head>
<body>
<div class="meter">
  <div class="top-row">
    <div class="title">🌈 Like-O-Meter</div>
    <div class="like-count"><span class="heart">❤️</span><span id="like-num">0</span></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-meta">
      <span id="next-label">1,000 likes to next level</span>
      <span class="power" id="power">WARMING UP...</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="bar" style="width:0%"></div>
      <div class="bar-gloss"></div>
    </div>
  </div>
  <div class="milestone" id="milestone"></div>
</div>
<script>
const SESSION='rainbow4life420-m7k3';
const T=[1000,2500,5000,10000,20000,40000,75000];
const PWR=['WARMING UP...','GETTING VIBES 🌿','RAINBOW RISING! 🌈','CLOUD NINE! ☁️','HIGHER THAN HIGH! 🚀','ULTRA RAINBOW!! 🌈✨','MAXIMUM 420!! 🍃','OVER THE RAINBOW!!'];
const MS=['','1K Likes! 🌈','2.5K! Rise Up! 🌈','5K Likes! 🔥🌈','10K! Cloud Nine! ☁️','20K! So HIGH! 🍃','40K! UNSTOPPABLE!','75K!! MAXIMUM RAINBOW!! 🌈'];
let likes=parseInt(new URLSearchParams(location.search).get('likes'))||0;
let lastLv=-1;
function update(n){
  likes=Math.max(0,n);
  document.getElementById('like-num').textContent=likes.toLocaleString();
  let lv=0;for(let i=0;i<7;i++){if(likes>=T[i])lv=i+1;}
  const prev=lv===0?0:T[lv-1],next=lv<7?T[lv]:T[6];
  const pct=lv<7?((likes-prev)/(next-prev))*100:100;
  document.getElementById('bar').style.width=Math.min(pct,100)+'%';
  document.getElementById('next-label').textContent=lv<7?(next-likes).toLocaleString()+' to next level':'MAX LEVEL!! 🌈';
  document.getElementById('power').textContent=PWR[lv];
  if(lv>lastLv&&lv>0){lastLv=lv;const m=document.getElementById('milestone');m.textContent=MS[lv];m.classList.add('show');setTimeout(()=>m.classList.remove('show'),3500);}
}
update(likes);
const es=new EventSource('/events/'+SESSION);
es.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==='likeMeter')update(d.total||0);};
</script>
</body>
</html>
