<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#003594;--navy-deep:#041E42;--silver:#869397;--steel:#C0C0C0;--gold:#D4AF37;
  --ink:#020810;--ink-2:#050F1A;
  --text:#FFFFFF;--text-dim:#B8C8E8;--text-muted:#5a7a9a;
  --panel:rgba(4,14,34,.9);--panel-line:rgba(0,53,148,.5);
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:344px;height:340px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.leaderboard{
  width:344px;height:340px;background:var(--panel);border:1.5px solid var(--panel-line);border-radius:16px;
  padding:13px 14px;box-shadow:0 12px 34px rgba(0,0,0,.6),0 0 20px rgba(0,53,148,.15);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.leaderboard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--navy-deep),var(--navy) 30%,var(--steel) 50%,var(--navy) 70%,var(--navy-deep));}
.tabs{display:flex;margin-bottom:9px;border-radius:7px;overflow:hidden;border:1px solid var(--panel-line);flex-shrink:0;}
.tab{flex:1;padding:7px 4px;font-family:var(--font-cond);font-size:12px;font-weight:800;letter-spacing:1px;text-align:center;cursor:pointer;color:var(--text-muted);background:transparent;border:none;transition:all .2s;text-transform:uppercase;}
.tab.active{background:rgba(0,53,148,.35);color:var(--text);}
.lb-head{display:flex;align-items:center;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(0,53,148,.3);flex-shrink:0;}
.lb-title{font-family:var(--font-cond);font-weight:800;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:var(--steel);}
.lb-list{display:flex;flex-direction:column;gap:7px;flex:1;overflow:hidden;transition:opacity .25s;}
.lb-list.fade{opacity:0;}
.lb-row{display:flex;align-items:center;gap:10px;}
.lb-row.r1{border-left:3px solid #D4AF37;padding-left:6px;}
.lb-row.r2{border-left:3px solid #C0C0C0;padding-left:6px;}
.lb-row.r3{border-left:3px solid #CD7F32;padding-left:6px;}
.lb-rank{font-family:var(--font-display);font-size:20px;width:22px;text-align:center;flex-shrink:0;}
.lb-av{width:36px;height:36px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:15px;color:var(--ink-2);}
.lb-name{flex:1;min-width:0;}
.lb-name .n{font-weight:700;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-name .c{font-weight:700;font-size:16px;color:var(--steel);margin-top:1px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text-muted);text-align:center;}
.empty .e-label{font-family:var(--font-cond);font-size:13px;letter-spacing:2px;text-transform:uppercase;}
.empty .e-sub{font-size:12px;opacity:.6;}
</style>
</head>
<body>
<div class="leaderboard">
  <div class="tabs">
    <button class="tab active" onclick="setTab('gifters')">GIFTERS</button>
    <button class="tab" onclick="setTab('likers')">LIKERS</button>
    <button class="tab" onclick="setTab('followers')">FOLLOWS</button>
  </div>
  <div class="lb-head"><span class="lb-title" id="head-title">TOP GIFTERS</span></div>
  <div class="lb-list" id="list">
    <div class="empty"><div class="e-label">No data yet</div><div class="e-sub">Connect your stream to begin</div></div>
  </div>
</div>
<script>
const SESSION="senpaicjcollects0-v8n4";
const RANK_COLORS=["#D4AF37","#C0C0C0","#CD7F32","#5a7a9a","#5a7a9a"];
const AV_BG=["#003594","#869397","#8B4513","#041E42","#1a3a5c"];
const AV_BD=["#D4AF37","#C0C0C0","#CD7F32","#5a7a9a","#5a7a9a"];
const CFG={
  gifters:{title:"TOP GIFTERS",key:"gifters",sub:r=>r.count.toLocaleString()+" coins"},
  likers:{title:"TOP LIKERS",key:"likers",sub:r=>r.count.toLocaleString()+" likes"},
  followers:{title:"NEW FOLLOWERS",key:"followers",sub:()=>"just followed"},
};
let live={gifters:[],likers:[],followers:[]};
let currentTab="gifters";
function getInit(n){return(n||"?").replace("@","").charAt(0).toUpperCase();}
function renderTab(tab){
  const cfg=CFG[tab];
  document.getElementById("head-title").textContent=cfg.title;
  const rows=live[cfg.key]||[];
  const list=document.getElementById("list");
  list.classList.add("fade");
  setTimeout(()=>{
    if(rows.length===0){
      list.innerHTML="<div class=\"empty\"><div class=\"e-label\">No data yet</div><div class=\"e-sub\">Connect your stream to begin</div></div>";
    } else {
      list.innerHTML=rows.slice(0,5).map((r,i)=>
        "<div class=\"lb-row "+(i<3?"r"+(i+1):"")+"\"><span class=\"lb-rank\" style=\"color:"+RANK_COLORS[i]+"\">"+(i+1)+"</span><div class=\"lb-av\" style=\"background:"+AV_BG[i]+";border:2px solid "+AV_BD[i]+"\">"+getInit(r.nickname)+"</div><div class=\"lb-name\"><div class=\"n\">@"+(r.nickname||r.id||"unknown")+"</div><div class=\"c\">"+cfg.sub(r)+"</div></div></div>"
      ).join("");
    }
    list.classList.remove("fade");
  },150);
}
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["gifters","likers","followers"][i]===tab));
  renderTab(tab);
}
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{
  const d=JSON.parse(e.data);
  if(d.type==="state"){
    if(d.gifters!==undefined)live.gifters=d.gifters;
    if(d.likers!==undefined)live.likers=d.likers;
    if(d.followers!==undefined)live.followers=d.followers;
    renderTab(currentTab);
  }
};
let ai=0;setInterval(()=>{ai=(ai+1)%3;setTab(["gifters","likers","followers"][ai]);},8000);
renderTab("gifters");
</script>
</body>
</html>
