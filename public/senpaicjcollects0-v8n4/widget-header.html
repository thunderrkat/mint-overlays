<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@700;800;900&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#003594; --navy-deep:#041E42; --silver:#869397; --steel:#C0C0C0;
  --gold:#D4AF37; --white:#FFFFFF;
  --tiktok-pink:#FE2C55;
  --ink:#020810; --ink-2:#050F1A; --ink-3:#0A1F35;
  --text:#FFFFFF; --text-dim:#B8C8E8; --text-muted:#5a7a9a;
  --panel:rgba(4,14,34,.9); --panel-line:rgba(0,53,148,.55);
  --font-display:'Anton',sans-serif; --font-cond:'Saira Condensed',sans-serif; --font-body:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:160px;background:transparent;overflow:hidden;font-family:var(--font-body);}

.header{
  width:1080px;height:160px;padding:20px 34px;
  display:flex;align-items:center;gap:22px;
  background:linear-gradient(180deg,rgba(2,8,16,.96) 0%,rgba(4,14,34,.78) 100%);
  position:relative;overflow:hidden;
}
/* Bottom accent line — Cowboys navy to silver */
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--navy-deep), var(--navy) 30%, var(--steel) 50%, var(--navy) 70%, var(--navy-deep));
}
/* Subtle top line */
.header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,53,148,.6),transparent);
}

/* Avatar */
.avatar{position:relative;flex:none;}
.avatar-ring{
  width:110px;height:110px;border-radius:50%;padding:3px;
  background:linear-gradient(135deg,var(--navy),var(--steel),var(--navy));
  box-shadow:0 0 20px rgba(0,53,148,.6),0 0 40px rgba(0,53,148,.2);
}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.avatar .badge{
  position:absolute;right:-3px;bottom:-3px;
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),#B8960C);
  border:3px solid var(--ink-2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:11px;color:var(--ink-2);font-weight:900;
}

/* Identity */
.id{flex:1;min-width:0;}
.wordmark{
  font-family:var(--font-display);font-size:46px;line-height:.92;letter-spacing:.5px;
  transform:skewX(-4deg);
  text-shadow:0 3px 0 rgba(0,0,0,.7),0 0 30px rgba(0,53,148,.5);
  color:var(--white);
}
.wordmark .accent{color:var(--navy);-webkit-text-stroke:1px var(--steel);}
.submeta{display:flex;align-items:center;gap:10px;margin-top:8px;}
.submeta .handle{font-size:19px;font-weight:600;color:var(--text-dim);}
.submeta .sep{width:4px;height:4px;border-radius:50%;background:var(--navy);}
.submeta .game{font-size:17px;font-weight:600;color:var(--text-muted);}

/* Right side */
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex:none;}
.live-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--tiktok-pink);color:#fff;
  font-family:var(--font-body);font-weight:800;font-size:20px;letter-spacing:2px;
  padding:8px 18px 8px 13px;border-radius:10px;
  box-shadow:0 4px 16px rgba(254,44,85,.45);
  animation:livepulse 2.2s ease-out infinite;
}
.live-dot{width:10px;height:10px;border-radius:50%;background:#fff;animation:blink 1.1s infinite;}
.viewers{
  display:flex;align-items:center;gap:8px;
  background:rgba(4,14,34,.8);border:1.5px solid rgba(0,53,148,.5);
  color:var(--text);font-weight:700;font-size:19px;padding:7px 15px;border-radius:10px;
}
.viewers-icon{width:18px;height:18px;opacity:.7;}

@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(254,44,85,.55);}70%{box-shadow:0 0 0 12px rgba(254,44,85,0);}100%{box-shadow:0 0 0 0 rgba(254,44,85,0);}}
</style>
</head>
