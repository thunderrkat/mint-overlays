<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@700;800;900&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#003594;--navy-deep:#041E42;--silver:#869397;--steel:#C0C0C0;--gold:#D4AF37;
  --tiktok-pink:#FE2C55;--ink:#020810;--ink-2:#050F1A;
  --text:#FFFFFF;--text-dim:#B8C8E8;--text-muted:#5a7a9a;
  --panel:rgba(4,14,34,.9);--panel-line:rgba(0,53,148,.5);
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:460px;height:130px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.meter{
  width:460px;height:130px;background:var(--panel);border:1.5px solid var(--panel-line);
  border-radius:14px;padding:14px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 16px rgba(0,53,148,.15);
  display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;
}
.meter::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--navy-deep),var(--navy) 30%,var(--steel) 50%,var(--navy) 70%,var(--navy-deep));}
.top-row{display:flex;align-items:center;justify-content:space-between;}
.title{font-family:var(--font-cond);font-weight:800;font-size:17px;letter-spacing:3px;color:var(--silver);text-transform:uppercase;}
.like-count{font-family:var(--font-display);font-size:28px;color:var(--text);display:flex;align-items:baseline;gap:6px;}
.like-label{font-family:var(--font-cond);font-size:13px;color:var(--text-muted);letter-spacing:2px;}
.bar-wrap{display:flex;flex-direction:column;gap:5px;}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);}
.bar-meta .power{color:var(--gold);font-weight:800;font-family:var(--font-cond);letter-spacing:2px;font-size:13px;}
.bar-bg{height:20px;border-radius:4px;background:rgba(2,8,16,.9);overflow:hidden;border:1px solid rgba(0,53,148,.3);position:relative;}
.bar-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--navy-deep) 0%,var(--navy) 40%,var(--steel) 100%);
  box-shadow:0 0 12px rgba(0,53,148,.5);
  transition:width .8s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden;
}
.bar-fill::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2s ease-in-out infinite;}
.bar-gloss{position:absolute;inset:0;border-radius:4px;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent 55%);pointer-events:none;}
/* Segment marks on bar like a wrestling entrance ramp */
.bar-marks{position:absolute;inset:0;display:flex;}
.bar-mark{flex:1;border-right:1px solid rgba(255,255,255,.06);}
@keyframes shimmer{to{left:200%;}}
.milestone{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-family:var(--font-cond);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;color:var(--gold);opacity:0;transition:opacity .4s;}
.milestone.show{opacity:1;}
</style>
</head>
<body>
<div class="meter">
  <div class="top-row">
    <div class="title">LIKE-O-METER</div>
    <div class="like-count"><span id="like-num">0</span><span class="like-label">LIKES</span></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-meta">
      <span id="next-label">1,000 to next rank</span>
      <span class="power" id="power">ROOKIE</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="bar" style="width:0%"></div>
      <div class="bar-gloss"></div>
      <div class="bar-marks"><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div><div class="bar-mark"></div></div>
    </div>
  </div>
  <div class="milestone" id="milestone"></div>
</div>
<script>
const SESSION="senpaicjcollects0-v8n4";
const T=[1000,2500,5000,10000,20000,40000,75000];
const PWR=["ROOKIE","CONTENDER","RISING STAR","TAG CHAMP","INTERCONTINENTAL","WORLD CHAMP","HALL OF FAME","LEGEND"];
const MS=["","1K — CONTENDER!","2.5K — RISING STAR!","5K — TAG CHAMP!","10K — INTERCONTINENTAL!","20K — WORLD CHAMP!","40K — HALL OF FAME!","75K — LIVING LEGEND!"];
let likes=parseInt(new URLSearchParams(location.search).get("likes"))||0;
let lastLv=-1;
function update(n){
  likes=Math.max(0,n);
  document.getElementById("like-num").textContent=likes.toLocaleString();
  let lv=0;for(let i=0;i<7;i++){if(likes>=T[i])lv=i+1;}
  const prev=lv===0?0:T[lv-1],next=lv<7?T[lv]:T[6];
  const pct=lv<7?((likes-prev)/(next-prev))*100:100;
  document.getElementById("bar").style.width=Math.min(pct,100)+"%";
  document.getElementById("next-label").textContent=lv<7?(next-likes).toLocaleString()+" to next rank":"MAXIMUM POWER";
  document.getElementById("power").textContent=PWR[lv];
  if(lv>lastLv&&lv>0){lastLv=lv;const m=document.getElementById("milestone");m.textContent=MS[lv];m.classList.add("show");setTimeout(()=>m.classList.remove("show"),3500);}
}
update(likes);
const es=new EventSource("/events/"+SESSION);
es.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==="likeMeter")update(d.total||0);};
</script>
</body>
</html>
