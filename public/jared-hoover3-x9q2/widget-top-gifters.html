<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#9B5BFF; --gold:#F4B63C; --orange:#F0760F;
  --tiktok-pink:#FE2C55; --tiktok-cyan:#25F4EE; --ink-2:#0d0322;
  --text:#F5F2FF; --text-muted:#8f7bbf;
  --panel:rgba(16,5,38,.85); --panel-line:rgba(155,91,255,.42);
  --font-cond:'Saira Condensed',sans-serif; --font-body:'Outfit',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:344px; height:320px; background:transparent; overflow:hidden; font-family:var(--font-body); }

.leaderboard {
  width:344px; height:320px;
  background:var(--panel); border:1.5px solid var(--panel-line); border-radius:18px;
  padding:16px 16px 16px; backdrop-filter:blur(10px);
  box-shadow:0 12px 34px rgba(0,0,0,.45);
  display:flex; flex-direction:column;
}

/* Tab row */
.tabs { display:flex; gap:0; margin-bottom:12px; border-radius:10px; overflow:hidden; border:1px solid var(--panel-line); flex-shrink:0; }
.tab {
  flex:1; padding:7px 4px; font-family:var(--font-cond); font-size:13px; font-weight:800;
  letter-spacing:1px; text-align:center; cursor:pointer; color:var(--text-muted);
  background:transparent; border:none; transition:all .2s; text-transform:uppercase;
}
.tab.active { background:rgba(155,91,255,.3); color:var(--text); }

.lb-head {
  display:flex; align-items:center; gap:9px; margin-bottom:10px; padding-bottom:8px;
  border-bottom:1px solid rgba(155,91,255,.22); flex-shrink:0;
}
.lb-head .t {
  font-family:var(--font-cond); font-weight:800; font-size:21px; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase;
}
.lb-list { display:flex; flex-direction:column; gap:7px; flex:1; overflow:hidden; }
.lb-row { display:flex; align-items:center; gap:12px; }
.lb-rank { font-family:'Anton',sans-serif; font-size:20px; width:22px; text-align:center; flex-shrink:0; }
.lb-av {
  width:36px; height:36px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:15px; color:var(--ink-2);
}
.lb-name { flex:1; min-width:0; }
.lb-name .n { font-weight:700; font-size:16px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-name .c { font-weight:600; font-size:12px; color:#9d86c9; }
.lb-icon { font-size:15px; flex-shrink:0; }

/* Transition */
.lb-list { transition:opacity .3s ease; }
.lb-list.fade { opacity:0; }
</style>
</head>
<body>
<div class="leaderboard">
  <div class="tabs">
    <button class="tab active" onclick="setTab('gifters')">🎁 Gifters</button>
    <button class="tab" onclick="setTab('likers')">❤️ Likers</button>
    <button class="tab" onclick="setTab('followers')">➕ Follows</button>
  </div>
  <div class="lb-head">
    <span id="head-icon">🏆</span>
    <span class="t" id="head-title">Top Gifters</span>
  </div>
  <div class="lb-list" id="list"></div>
</div>

<script>
const CONFIGS = {
  gifters: {
    icon:'🏆', title:'Top Gifters',
    data:[
      { name:'@xClipsKing',  sub:'48.2K coins', color:'linear-gradient(135deg,#F4B63C,#E8821F)', border:'#F4B63C', rank:'#F4B63C', icon:'👑', init:'X' },
      { name:'@valleygirl',  sub:'31.7K coins', color:'linear-gradient(135deg,#C9CBD6,#8E90A0)', border:'#C9CBD6', rank:'#C9CBD6', icon:'💎', init:'V' },
      { name:'@noscope_ned', sub:'22.9K coins', color:'linear-gradient(135deg,#E0823C,#A8521C)', border:'#E0823C', rank:'#E0823C', icon:'🌹', init:'N' },
      { name:'@sara_v',      sub:'11.2K coins', color:'linear-gradient(135deg,#9B5BFF,#6C28D9)', border:'#9B5BFF', rank:'#9B5BFF', icon:'💜', init:'S' },
      { name:'@dbz_andy',    sub:'8.4K coins',  color:'linear-gradient(135deg,#FE2C55,#a01535)', border:'#FE2C55', rank:'#FE2C55', icon:'🐉', init:'D' },
    ]
  },
  likers: {
    icon:'❤️', title:'Top Likers',
    data:[
      { name:'@hypebeast',   sub:'2,840 likes', color:'linear-gradient(135deg,#F4B63C,#E8821F)', border:'#F4B63C', rank:'#F4B63C', icon:'🔥', init:'H' },
      { name:'@kayla_x',     sub:'1,920 likes', color:'linear-gradient(135deg,#C9CBD6,#8E90A0)', border:'#C9CBD6', rank:'#C9CBD6', icon:'💖', init:'K' },
      { name:'@mike_jones',  sub:'1,540 likes', color:'linear-gradient(135deg,#E0823C,#A8521C)', border:'#E0823C', rank:'#E0823C', icon:'⚡', init:'M' },
      { name:'@superfan',    sub:'990 likes',   color:'linear-gradient(135deg,#9B5BFF,#6C28D9)', border:'#9B5BFF', rank:'#9B5BFF', icon:'💜', init:'S' },
      { name:'@goku_super',  sub:'770 likes',   color:'linear-gradient(135deg,#FE2C55,#a01535)', border:'#FE2C55', rank:'#FE2C55', icon:'🐉', init:'G' },
    ]
  },
  followers: {
    icon:'➕', title:'New Followers',
    data:[
      { name:'@nightowl_tx',    sub:'just followed', color:'linear-gradient(135deg,#25F4EE,#0aa)', border:'#25F4EE', rank:'#25F4EE', icon:'🆕', init:'N' },
      { name:'@purple_light7',  sub:'just followed', color:'linear-gradient(135deg,#9B5BFF,#6C28D9)', border:'#9B5BFF', rank:'#9B5BFF', icon:'🆕', init:'P' },
      { name:'@zfighter44',     sub:'just followed', color:'linear-gradient(135deg,#F4B63C,#E8821F)', border:'#F4B63C', rank:'#F4B63C', icon:'🆕', init:'Z' },
      { name:'@dbz_lover99',    sub:'just followed', color:'linear-gradient(135deg,#FE2C55,#a01535)', border:'#FE2C55', rank:'#FE2C55', icon:'🆕', init:'D' },
      { name:'@fortnite_queen', sub:'just followed', color:'linear-gradient(135deg,#C9CBD6,#8E90A0)', border:'#C9CBD6', rank:'#C9CBD6', icon:'🆕', init:'F' },
    ]
  }
};

let currentTab = 'gifters';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['gifters','likers','followers'][i] === tab);
  });
  const cfg = CONFIGS[tab];
  document.getElementById('head-icon').textContent = cfg.icon;
  document.getElementById('head-title').textContent = cfg.title;
  const list = document.getElementById('list');
  list.classList.add('fade');
  setTimeout(() => {
    list.innerHTML = cfg.data.map((r, i) => `
      <div class="lb-row">
        <span class="lb-rank" style="color:${r.rank}">${i+1}</span>
        <div class="lb-av" style="background:${r.color};border:2px solid ${r.border}">${r.init}</div>
        <div class="lb-name"><div class="n">${r.name}</div><div class="c">${r.sub}</div></div>
        <span class="lb-icon">${r.icon}</span>
      </div>`).join('');
    list.classList.remove('fade');
  }, 150);
}

// Auto-cycle every 8 seconds
const tabs = ['gifters','likers','followers'];
let autoIdx = 0;
setInterval(() => {
  autoIdx = (autoIdx + 1) % 3;
  setTab(tabs[autoIdx]);
}, 8000);

setTab('gifters');
</script>
</body>
</html>
