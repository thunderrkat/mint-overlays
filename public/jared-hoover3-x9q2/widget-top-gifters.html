<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#9B5BFF; --gold:#F4B63C; --orange:#F0760F;
  --tiktok-pink:#FE2C55; --ink-2:#0d0322;
  --text:#F5F2FF; --text-muted:#8f7bbf;
  --panel:rgba(16,5,38,.85); --panel-line:rgba(155,91,255,.42);
  --font-cond:'Saira Condensed',sans-serif; --font-body:'Outfit',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:344px; height:320px; background:transparent; overflow:hidden; font-family:var(--font-body); }

.leaderboard {
  width:344px; height:320px;
  background:var(--panel); border:1.5px solid var(--panel-line); border-radius:18px;
  padding:16px 16px 16px; backdrop-filter:blur(10px);
  box-shadow:0 12px 34px rgba(0,0,0,.45);
  display:flex; flex-direction:column;
}
.lb-head {
  display:flex; align-items:center; gap:9px; margin-bottom:12px; padding-bottom:10px;
  border-bottom:1px solid rgba(155,91,255,.22); flex-shrink:0;
}
.lb-head .t {
  font-family:var(--font-cond); font-weight:800; font-size:23px; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase;
}
.lb-list { display:flex; flex-direction:column; gap:8px; flex:1; }
.lb-row { display:flex; align-items:center; gap:12px; }
.lb-rank { font-family:'Anton',sans-serif; font-size:20px; width:22px; text-align:center; flex-shrink:0; }
.lb-av {
  width:38px; height:38px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:16px; color:var(--ink-2);
}
.lb-name { flex:1; min-width:0; }
.lb-name .n { font-weight:700; font-size:17px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-name .c { font-weight:600; font-size:13px; color:#9d86c9; }
.lb-icon { font-size:16px; flex-shrink:0; }
</style>
</head>
<body>
<div class="leaderboard">
  <div class="lb-head"><span>🏆</span><span class="t">Top Gifters</span></div>
  <div class="lb-list" id="list"></div>
</div>

<script>
const defaults = [
  { name:'@xClipsKing',  coins:'48.2K', color:'linear-gradient(135deg,#F4B63C,#E8821F)', border:'#F4B63C', rankColor:'#F4B63C', icon:'👑', initial:'X' },
  { name:'@valleygirl',  coins:'31.7K', color:'linear-gradient(135deg,#C9CBD6,#8E90A0)', border:'#C9CBD6', rankColor:'#C9CBD6', icon:'💎', initial:'V' },
  { name:'@noscope_ned', coins:'22.9K', color:'linear-gradient(135deg,#E0823C,#A8521C)', border:'#E0823C', rankColor:'#E0823C', icon:'🌹', initial:'N' },
  { name:'@sara_v',      coins:'11.2K', color:'linear-gradient(135deg,#9B5BFF,#6C28D9)', border:'#9B5BFF', rankColor:'#9B5BFF', icon:'💜', initial:'S' },
  { name:'@dbz_andy',    coins:'8.4K',  color:'linear-gradient(135deg,#FE2C55,#a01535)', border:'#FE2C55', rankColor:'#FE2C55', icon:'🐉', initial:'D' },
];

const p = new URLSearchParams(location.search);
const gifters = defaults.map((d, i) => {
  const v = p.get('g' + (i+1));
  if (v) { const [name, coins] = v.split(':'); return { ...d, name:'@'+name, coins:coins||d.coins }; }
  return d;
});

document.getElementById('list').innerHTML = gifters.map((g, i) => `
  <div class="lb-row">
    <span class="lb-rank" style="color:${g.rankColor}">${i+1}</span>
    <div class="lb-av" style="background:${g.color}; border:2px solid ${g.border};">${g.initial}</div>
    <div class="lb-name">
      <div class="n">${g.name}</div>
      <div class="c">${g.coins} coins</div>
    </div>
    <span class="lb-icon">${g.icon}</span>
  </div>
`).join('');
</script>
</body>
</html>
