<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800;900&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#9B5BFF; --purple-deep:#6C28D9; --gold:#F4B63C; --orange:#F0760F;
  --tiktok-pink:#FE2C55; --ink-2:#0d0322; --ink-3:#1a0742;
  --text:#F5F2FF; --text-dim:#C9AEFF; --text-muted:#8f7bbf;
  --panel:rgba(16,5,38,.88); --panel-line:rgba(155,91,255,.42);
  --font-display:'Anton',sans-serif; --font-cond:'Saira Condensed',sans-serif; --font-body:'Outfit',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:460px; height:130px; background:transparent; overflow:hidden; font-family:var(--font-body); }

.meter {
  width:460px; height:130px;
  background:var(--panel); border:1.5px solid var(--panel-line);
  border-radius:16px; padding:14px 20px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,.5), 0 0 20px rgba(155,91,255,.15);
  display:flex; flex-direction:column; gap:10px;
  position:relative; overflow:hidden;
}
.meter::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 150%, rgba(240,118,15,.12), transparent 60%);
  pointer-events:none;
}

/* Top row: label + count */
.top-row { display:flex; align-items:center; justify-content:space-between; }
.title {
  font-family:var(--font-cond); font-weight:800; font-size:18px;
  letter-spacing:2px; color:var(--gold); text-transform:uppercase;
  display:flex; align-items:center; gap:7px;
}
.like-count {
  font-family:var(--font-display); font-size:26px; color:var(--tiktok-pink);
  text-shadow:0 0 12px rgba(254,44,85,.6);
  display:flex; align-items:center; gap:6px;
}
.like-count .heart { font-size:18px; animation:heartbeat 1s ease-in-out infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1);}50%{transform:scale(1.3);} }

/* Bar */
.bar-wrap { display:flex; flex-direction:column; gap:5px; }
.bar-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); }
.bar-meta .power { color:var(--gold); font-weight:700; font-family:var(--font-cond); letter-spacing:1px; }
.bar-bg {
  height:18px; border-radius:9px; background:rgba(7,1,18,.85);
  overflow:hidden; border:1px solid rgba(155,91,255,.25); position:relative;
}
.bar-fill {
  height:100%; border-radius:9px;
  background:linear-gradient(90deg, var(--tiktok-pink) 0%, #FF6B35 50%, var(--gold) 100%);
  box-shadow:0 0 14px rgba(254,44,85,.5);
  transition:width 0.8s cubic-bezier(.25,.46,.45,.94);
  position:relative; overflow:hidden;
}
.bar-fill::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
  animation:shimmer 2s ease-in-out infinite;
}
.bar-gloss {
  position:absolute; inset:0; border-radius:9px;
  background:linear-gradient(180deg,rgba(255,255,255,.3),transparent 55%);
  pointer-events:none;
}
@keyframes shimmer { to { left:200%; } }

/* Milestone toast */
.milestone {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  font-size:12px; font-weight:700; color:var(--tiktok-pink); letter-spacing:1px;
  white-space:nowrap; text-shadow:0 0 8px rgba(254,44,85,.6);
  opacity:0; transition:opacity .4s;
}
.milestone.show { opacity:1; }
</style>
</head>
<body>
<div class="meter">
  <div class="top-row">
    <div class="title">❤️ Like-O-Meter</div>
    <div class="like-count"><span class="heart">❤️</span><span id="like-num">0</span></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-meta">
      <span id="next-label">1,000 likes to next level</span>
      <span class="power" id="power">WARMING UP...</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="bar" style="width:0%"></div>
      <div class="bar-gloss"></div>
    </div>
  </div>
  <div class="milestone" id="milestone"></div>
</div>

<script>
const THRESHOLDS = [1000, 2500, 5000, 10000, 20000, 40000, 75000];
const POWER = ['WARMING UP...','GETTING SERIOUS','SUPER SAIYAN!','SUPER SAIYAN 2!','SUPER SAIYAN 3!','SUPER SAIYAN GOD!','ULTRA INSTINCT!!','OVER 9,000!!'];
const MILESTONE_MSGS = ['','1K Likes! 🔥','2.5K Likes! Let\'s GO!','5K Likes! 🔥🔥','10K Likes! SUPER SAIYAN!','20K Likes! 🔥🔥🔥','40K Likes! UNSTOPPABLE!','75K LIKES!! ULTRA INSTINCT!!'];

let likes = parseInt(new URLSearchParams(location.search).get('likes')) || 0;
let lastLevel = -1;

function update(n) {
  likes = Math.max(0, n);
  document.getElementById('like-num').textContent = likes.toLocaleString();

  let level = 0;
  for (let i = 0; i < 7; i++) { if (likes >= THRESHOLDS[i]) level = i + 1; }

  const prev = level === 0 ? 0 : THRESHOLDS[level-1];
  const next = level < 7 ? THRESHOLDS[level] : THRESHOLDS[6];
  const pct = level < 7 ? ((likes - prev) / (next - prev)) * 100 : 100;
  document.getElementById('bar').style.width = Math.min(pct, 100) + '%';

  const remaining = level < 7 ? (next - likes).toLocaleString() + ' to next level' : 'MAX POWER!! 🔥';
  document.getElementById('next-label').textContent = remaining;
  document.getElementById('power').textContent = POWER[level];

  if (level > lastLevel && level > 0) {
    lastLevel = level;
    const m = document.getElementById('milestone');
    m.textContent = MILESTONE_MSGS[level];
    m.classList.add('show');
    setTimeout(() => m.classList.remove('show'), 3500);
  }
}

update(likes);
window.addEventListener('message', e => { if (e.data && e.data.likes !== undefined) update(e.data.likes); });
</script>
</body>
</html>
<script>
// SSE live connection for like count
const _es = new EventSource('/events/jared-hoover3-x9q2');
_es.onmessage = e => {
  const d = JSON.parse(e.data);
  if (d.type === 'state' && d.likers) {
    const total = d.likers.reduce((sum, u) => sum + (u.count || 0), 0);
    update(total);
  }
};
</script>
