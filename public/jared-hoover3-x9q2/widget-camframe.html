<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#9B5BFF; --purple-deep:#6C28D9; --gold:#F4B63C;
  --tiktok-pink:#FE2C55; --ink-2:#0d0322;
  --text:#F5F2FF; --font-display:'Anton',sans-serif; --font-body:'Outfit',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { width:392px; height:292px; background:transparent; overflow:hidden; font-family:var(--font-body); }

.facecam { width:392px; height:292px; animation:float 6s ease-in-out infinite; position:relative; }
.facecam-frame {
  position:absolute; inset:0; border-radius:22px; padding:4px;
  background:linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 40%, var(--gold) 100%);
  box-shadow:0 18px 44px rgba(0,0,0,.55), 0 0 30px rgba(155,91,255,.45);
  animation:border-hue 6s linear infinite;
}
@keyframes border-hue { to { filter:hue-rotate(30deg); } }

.facecam-inner {
  position:relative; width:100%; height:100%; border-radius:18px; overflow:hidden;
  background:var(--ink-2); display:flex; align-items:center; justify-content:center;
}
.placeholder {
  color:#5a4a7a; font-weight:600; font-size:18px; letter-spacing:1px; text-align:center;
}
.facecam-scrim {
  position:absolute; left:0; right:0; bottom:0; height:46%;
  background:linear-gradient(180deg, transparent, rgba(6,1,15,.85)); pointer-events:none;
}
.facecam-name {
  position:absolute; left:14px; bottom:13px; display:flex; align-items:center; gap:9px;
}
.facecam-name span:first-child {
  font-family:var(--font-display); font-size:24px; color:var(--text);
  transform:skewX(-5deg); text-shadow:0 2px 6px rgba(0,0,0,.7);
}
.facecam-tag {
  position:absolute; right:12px; top:12px; display:flex; align-items:center; gap:6px;
  background:rgba(254,44,85,.92); padding:5px 11px; border-radius:8px;
  font-weight:800; font-size:14px; letter-spacing:1.5px; color:#fff;
}
.facecam-tag .dot { width:8px; height:8px; border-radius:50%; background:#fff; animation:livedot 1.1s infinite; }

@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }
@keyframes livedot { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);} }
</style>
</head>
<body>
<div class="facecam">
  <div class="facecam-frame">
    <div class="facecam-inner">
      <div class="placeholder">📸<br>CAM SOURCE</div>
      <div class="facecam-scrim"></div>
      <div class="facecam-name"><span>JARED</span><span>🎮</span></div>
      <div class="facecam-tag"><span class="dot"></span>CAM</div>
    </div>
  </div>
</div>
</body>
</html>
