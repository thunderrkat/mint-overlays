<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>*{margin:0;padding:0;}body{width:1px;height:1px;background:transparent;overflow:hidden;}</style>
</head><body>
<script>
const SUPA_URL="https://tpmfivjjyujwdkxtvjcy.supabase.co";
const SUPA_KEY="sb_publishable_Y9TB29NDQSOmv7p57dX-lg_WIMMOL-U";
const SESSION="jared-hoover3-x9q2";
let vips=[],queue=[],playing=false;
const playedThisSession=new Set(); // reset on page reload = stream restart

async function loadVips(){
  try{
    const res=await fetch(SUPA_URL+"/rest/v1/vip_sounds?session_id=eq."+encodeURIComponent(SESSION)+"&order=position.asc",{
      headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY},
    });
    if(res.ok)vips=await res.json();
  }catch(e){}
}

function findVip(u){
  if(!u)return null;
  const n=u.toLowerCase().replace(/^@/,"");
  return vips.find(v=>v.username===n)||null;
}

function playSound(vip){
  // Only play once per session per VIP
  if(playedThisSession.has(vip.username))return;
  playedThisSession.add(vip.username);
  queue.push(vip);
  if(!playing)nextSound();
}

function nextSound(){
  if(!queue.length){playing=false;return;}
  playing=true;
  const vip=queue.shift();
  try{
    const a=new Audio(vip.sound_data);
    a.play().catch(()=>{playing=false;nextSound();});
    a.onended=()=>{playing=false;nextSound();};
    a.onerror=()=>{playing=false;nextSound();};
  }catch(e){playing=false;nextSound();}
}

loadVips();
setInterval(loadVips,30000);

function connectSSE(){
  const es=new EventSource("/events/"+SESSION);
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    // Only trigger on JOIN — not on every chat message
    if(d.type==="join"){
      const v=findVip(d.nickname||d.uniqueId);
      if(v)playSound(v);
    }
  };
  es.onerror=()=>{es.close();setTimeout(connectSSE,3000);};
}
connectSSE();
</script>
</body></html>
