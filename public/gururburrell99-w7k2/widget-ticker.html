<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@600;700;800&family=Saira+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#6B21A8;--purple-hi:#A855F7;--purple-lo:#3B0764;
  --green:#00FF88;--green-lo:#00CC66;
  --orange:#F97316;--orange-hi:#FB923C;
  --ink:#030712;--ink-2:#0B0F1A;--ink-3:#111827;
  --text:#F0F4FF;--text-dim:#C4B5FD;--text-muted:#6D5A8A;
  --panel:rgba(11,15,26,.93);--panel-line:rgba(107,33,168,.5);
  --font-display:"Anton",sans-serif;--font-cond:"Saira Condensed",sans-serif;--font-body:"Outfit",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:64px;background:transparent;overflow:hidden;font-family:var(--font-body);}
.ticker{width:1080px;height:64px;display:flex;align-items:center;overflow:hidden;
  background:linear-gradient(90deg,rgba(3,7,18,.97),rgba(11,15,26,.93));position:relative;}
.ticker::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--ink),var(--purple-lo) 20%,var(--purple-hi) 40%,var(--green) 60%,var(--purple-hi) 80%,var(--ink));
  box-shadow:0 0 10px rgba(0,255,136,.6);}
.ticker::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--ink),var(--purple-lo) 20%,var(--purple-hi) 40%,var(--green) 60%,var(--purple-hi) 80%,var(--ink));
  box-shadow:0 0 10px rgba(0,255,136,.6);}
.ticker-label{flex:none;display:flex;align-items:center;gap:10px;height:100%;padding:0 20px;z-index:2;
  background:linear-gradient(90deg,var(--purple-lo),var(--green-dim));
  font-family:var(--font-cond);font-weight:800;font-size:19px;letter-spacing:3px;color:#fff;
  box-shadow:6px 0 18px rgba(0,0,0,.7);white-space:nowrap;border-right:2px solid rgba(0,255,136,.3);}
.ticker-window{flex:1;overflow:hidden;}
.ticker-track{display:flex;align-items:center;white-space:nowrap;}
.ticker-item{display:inline-flex;align-items:center;gap:10px;padding:0 26px;font-size:17px;font-weight:600;color:var(--text-dim);border-right:1px solid rgba(0,255,136,.12);}
.ticker-item .type{font-family:var(--font-cond);font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0;}
.ticker-item .type.gift{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.ticker-item .type.follow{background:rgba(168,85,247,.12);color:var(--purple-hi);border:1px solid rgba(168,85,247,.2);}
.ticker-item .type.join{background:rgba(249,115,22,.1);color:var(--orange-hi);border:1px solid rgba(249,115,22,.2);}
.ticker-item .who{font-weight:800;color:var(--text);}
.ticker-waiting{padding:0 24px;font-family:var(--font-cond);font-size:13px;letter-spacing:2px;color:rgba(0,255,136,.35);text-transform:uppercase;}
</style>
</head>
<body>
<div class="ticker">
  <div class="ticker-label">🛸 TRANSMISSIONS</div>
  <div class="ticker-window"><div class="ticker-track" id="track"><div class="ticker-waiting">AWAITING SIGNALS FROM EARTH…</div></div></div>
</div>
<script>
const SESSION="gururburrell99-w7k2";
const track=document.getElementById("track");
let events=[],offset=0,animId;
function build(){
  if(events.length===0){cancelAnimationFrame(animId);track.style.transform="";track.innerHTML="<div class=\"ticker-waiting\">AWAITING SIGNALS FROM EARTH…</div>";return;}
  const d=[...events,...events];
  track.innerHTML=d.map(e=>"<span class=\"ticker-item\"><span class=\"type "+e.type+"\">"+e.typeLabel+"</span><span class=\"who\">"+e.who+"</span><span>"+e.msg+"</span></span>").join("");
  cancelAnimationFrame(animId);offset=0;scroll();
}
function scroll(){
  const hw=track.scrollWidth/2;
  function step(){offset+=1.2;if(offset>=hw)offset=0;track.style.transform="translateX(-"+offset+"px)";animId=requestAnimationFrame(step);}
  animId=requestAnimationFrame(step);
}
function addEvent(evt){events.unshift(evt);if(events.length>20)events.pop();build();}
let prevGifters=[],prevFollowers=[],seenJoins=new Set();
function connectSSE(){
  const es=new EventSource("/events/"+SESSION);
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==="state"){
      if(d.gifters){d.gifters.forEach(g=>{const prev=prevGifters.find(p=>p.id===g.id);if(!prev)addEvent({type:"gift",typeLabel:"GIFT",who:"@"+(g.nickname||g.id),msg:"sent a gift"});else if(g.count>prev.count)addEvent({type:"gift",typeLabel:"GIFT",who:"@"+(g.nickname||g.id),msg:"sent another gift"});});prevGifters=d.gifters;}
      if(d.followers){d.followers.forEach(f=>{const key=f.id||f.nickname;if(!prevFollowers.find(p=>(p.id||p.nickname)===key))addEvent({type:"follow",typeLabel:"FOLLOW",who:"@"+(f.nickname||f.id),msg:"followed"});});prevFollowers=d.followers;}
    }
    if(d.type==="join"){const key=d.nickname||"unknown";if(!seenJoins.has(key)){seenJoins.add(key);if(seenJoins.size>300)seenJoins.clear();addEvent({type:"join",typeLabel:"BEAMED IN",who:"@"+key,msg:"joined the stream"});}}
  };
  es.onerror=()=>{es.close();setTimeout(connectSSE,3000);};
}
connectSSE();
build();
</script>
</body>
</html>
